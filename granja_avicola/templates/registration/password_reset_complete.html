{% extends 'base.html' %}

{% block title %}
Aviara - ¡Listo!
{% endblock %}

{% block content %}
<div class="flex justify-center items-center" style="min-height: 70vh;">
    <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-8 border-t-8 border-green-700 text-center">
        <div class="mb-6 flex justify-center">
            <div class="bg-green-100 p-4 rounded-full text-green-700">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-800 mb-2">¡Todo listo!</h2>
        <p class="text-gray-600 mb-8">Tu contraseña ha sido restablecida correctamente.</p>
        <a href="{% url 'login' %}" class="inline-block w-full bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg">Iniciar sesión</a>
    </div>
</div>
{% endblock %}
