{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg p-4 text-center" style="border-radius: 20px; background-color: #ffffff;">
            <div class="card-body">
                <div class="mb-4">
                    <span style="font-size: 4rem;">📩</span>
                </div>
                
                <h3 class="fw-bold mb-3" style="color: #030303; letter-spacing: -1px;">Correo Enviado</h3>
                
                <p class="text-muted mb-4">
                    Hemos enviado instrucciones para restablecer tu contraseña a la dirección de correo proporcionada. 
                    Si la cuenta existe, recibirás el mensaje en unos minutos.
                </p>

                

                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-outline-dark w-100 py-2" style="border-radius: 10px; font-weight: bold;">
                        Volver al inicio de sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
