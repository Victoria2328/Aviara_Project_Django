{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card border-0 shadow p-4" style="border-radius: 20px; max-width: 400px;">
        <h3 class="text-center fw-bold mb-3">Recuperar Contraseña</h3>
        <p class="text-muted small text-center">Introduce tu correo y te enviaremos un enlace para cambiar tu clave de Aviara.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Correo Electrónico 📧</label>
                <input type="email" name="email" class="form-control" placeholder="tu@correo.com" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold" style="border-radius: 10px;">
                Enviar enlace
            </button>
        </form>
    </div>
</div>
{% endblock %}
