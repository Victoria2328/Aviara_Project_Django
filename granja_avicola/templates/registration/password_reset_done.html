{% extends 'base.html' %}

{% block title %}
Aviara - Correo Enviado
{% endblock %}

{% block content %}
<div class="flex justify-center items-center" style="min-height: 70vh;">
    <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-8 border-t-8 border-green-700 text-center">
        <div class="mb-6 flex justify-center">
            <div class="bg-blue-50 p-4 rounded-full">
                <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
            </div>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-800 mb-2">Revisa tu bandeja</h2>
        <p class="text-gray-600 mb-6">Te hemos enviado un correo con las instrucciones para crear una nueva clave.</p>
        <a href="{% url 'login' %}" class="text-green-700 font-bold hover:underline">← Volver al inicio</a>
    </div>
</div>
{% endblock %}
