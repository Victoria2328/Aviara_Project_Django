<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aviara - Gestion de Granja{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <nav class="bg-green-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Aviara</h1>
            <ul class="flex space-x-6">
                <li><a href="{% url 'home' %}" class="hover:text-green-200">Inicio</a></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        {% block content %}
        {% endblock %}
    </main>
    <footer class="text-center p-6 text-gray-500">
        &copy; 2026 Aviara - Software de Gestión Avícola y Agrícola.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
